    <!-- fade right — wide, gentle -->
    <rect x="0" y="0" width="300" height="320" fill="url(#fadeR)"/>
    <!-- fade bottom — natural foot blend -->
    <rect x="0" y="0" width="300" height="320" fill="url(#fadeB)"/>

